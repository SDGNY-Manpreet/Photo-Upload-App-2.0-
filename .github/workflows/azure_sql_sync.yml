name: Sync Procore Projects to Azure SQL

on:
  schedule:
    # Run at 2:00 AM every other day
    - cron: '0 2 */2 * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  sync_projects:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies for ODBC
        run: |
          curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -
          curl https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql17 unixodbc-dev

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; else pip install requests toml pyodbc pandas; fi

      - name: Create Secrets File
        run: |
          mkdir -p .streamlit
          cat << 'EOF' > .streamlit/secrets.toml
          [procore]
          client_id = "${{ secrets.PROCORE_CLIENT_ID }}"
          client_secret = "${{ secrets.PROCORE_CLIENT_SECRET }}"
          base_url = "https://api.procore.com/rest/v1.0/"
          token_url = "https://login.procore.com/oauth/token"
          
          [azure_sql]
          AZURE_DB_SERVER = "${{ secrets.AZURE_DB_SERVER }}"
          AZURE_DB_NAME = "${{ secrets.AZURE_DB_NAME }}"
          AZURE_DB_USERNAME = "${{ secrets.AZURE_DB_USERNAME }}"
          AZURE_DB_PASSWORD = "${{ secrets.AZURE_DB_PASSWORD }}"
          AZURE_DB_DRIVER = "ODBC Driver 17 for SQL Server"
          EOF

      - name: Run Synchronization Script
        run: |
          PYTHONPATH=backend python backend/sync_procore_projects.py
